<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人狼ゲーム 完全版</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: #222;
  color: white;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}

.player {
  margin: 5px;
  padding: 10px;
  background: #444;
  display: inline-block;
}

.dead {
  background: #111;
  color: gray;
}
</style>
</head>

<body>

<h1>🐺 人狼ゲーム（機能つき）</h1>
<button onclick="startGame()">ゲーム開始</button>

<div id="roleArea"></div>
<div id="gameArea" style="display:none;"></div>

<script>
let players = [];
let roles = [];
let alive = [];
let phase = "day";
let knightGuard = -1;

function startGame() {
  roles = [
    "人狼",
    "市民","市民","市民",
    "狂人",
    "占い師",
    "騎士"
  ];

  roles.sort(() => Math.random() - 0.5);

  players = [];
  alive = [];

  for (let i = 0; i < roles.length; i++) {
    players.push({id:i, role:roles[i], alive:true});
    alive.push(true);
  }

  showRoles();
}

function showRoles() {
  let html = "<h2>役職確認（交代で見て）</h2>";
  players.forEach((p,i)=>{
    html += `<button onclick="alert('プレイヤー${i+1}：${p.role}')">P${i+1}</button>`;
  });
  html += `<br><button onclick="startGamePlay()">ゲーム開始</button>`;
  document.getElementById("roleArea").innerHTML = html;
}

function startGamePlay() {
  document.getElementById("roleArea").innerHTML = "";
  document.getElementById("gameArea").style.display = "block";
  render();
}

function render() {
  let html = `<h2>現在：${phase === "day" ? "昼（投票）" : "夜（能力）"}</h2>`;

  players.forEach((p,i)=>{
    html += `<div class="player ${!p.alive ? 'dead':''}">
      P${i+1}<br>${p.alive ? "" : "💀"}
    </div>`;
  });

  html += "<br>";

  if (phase === "day") {
    html += "<h3>投票（処刑）</h3>";
    players.forEach((p,i)=>{
      if(p.alive){
        html += `<button onclick="vote(${i})">P${i+1}</button>`;
      }
    });
    html += `<br><button onclick="phase='night';render()">夜へ</button>`;
  } else {
    html += "<h3>夜の行動</h3>";

    // 占い
    html += "<p>🔮占い</p>";
    players.forEach((p,i)=>{
      if(p.alive){
        html += `<button onclick="fortune(${i})">P${i+1}</button>`;
      }
    });

    // 騎士
    html += "<p>🛡騎士</p>";
    players.forEach((p,i)=>{
      if(p.alive){
        html += `<button onclick="guard(${i})">P${i+1}</button>`;
      }
    });

    // 人狼
    html += "<p>🐺襲撃</p>";
    players.forEach((p,i)=>{
      if(p.alive){
        html += `<button onclick="attack(${i})">P${i+1}</button>`;
      }
    });

    html += `<br><button onclick="phase='day';render()">昼へ</button>`;
  }

  document.getElementById("gameArea").innerHTML = html;
}

// 投票
function vote(i){
  players[i].alive = false;
  alert("P"+(i+1)+"を処刑した");
  checkWin();
  render();
}

// 占い
function fortune(i){
  let role = players[i].role;
  if(role === "人狼"){
    alert("結果：人狼");
  } else {
    alert("結果：白");
  }
}

// 騎士
function guard(i){
  knightGuard = i;
  alert("P"+(i+1)+"を守った");
}

// 人狼襲撃
function attack(i){
  if(i === knightGuard){
    alert("守られていた！");
  } else {
    players[i].alive = false;
    alert("P"+(i+1)+"が襲撃された");
  }
  knightGuard = -1;
  checkWin();
  render();
}

// 勝敗判定
function checkWin(){
  let wolf = players.filter(p=>p.role==="人狼" && p.alive).length;
  let human = players.filter(p=>p.role!=="人狼" && p.alive).length;

  if(wolf === 0){
    alert("村人陣営の勝ち！");
  }
  if(wolf >= human){
    alert("人狼陣営の勝ち！");
  }
}
</script>

</body>
</html>
