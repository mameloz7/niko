
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人狼ゲーム 完全版</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  background:linear-gradient(135deg,#1a1a1a,#333);
  color:white;
}
.box{
  background:#333;
  padding:15px;
  margin:15px;
  border-radius:10px;
  display:inline-block;
}
button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#ff4c4c;
  color:white;
}
.dead{color:gray;}
#role{font-size:22px;margin-top:10px;}
a{color:skyblue;}
</style>
</head>

<body>

<h1>🐺 人狼ゲーム（合体版）</h1>

<div class="box">
<h2>📖 遊び方</h2>
<p>
① ゲーム作成<br>
② URL共有<br>
③ 参加する<br>
④ 役職確認<br>
⑤ ゲーム開始
</p>
</div>

<button onclick="createGame()">ゲーム作成</button>
<p id="share"></p>

<button onclick="joinGame()">参加する</button>
<div id="role" onclick="showRole()">タップで役職表示</div>

<hr>

<button onclick="startGame()">ゲーム開始（進行役）</button>
<div id="game"></div>

<script>
let myIndex=null;
let roleList=[];
let players=[];
let phase="day";
let guard=-1;

// ===== URL系 =====

// 作成
function createGame(){
  let roles=["人狼","市民","市民","市民","狂人","占い師","騎士"];
  roles.sort(()=>Math.random()-0.5);

  let url=location.origin+location.pathname+
  "?roles="+encodeURIComponent(roles.join(","))+"&used=";

  document.getElementById("share").innerHTML=
  "URL👇<br><a href='"+url+"'>"+url+"</a>";
}

// 参加
function joinGame(){
  let params=new URLSearchParams(location.search);
  let roles=params.get("roles");
  let used=params.get("used")||"";

  if(!roles){alert("先に作成");return;}

  roleList=roles.split(",");
  let usedArr=used?used.split(","):[];

  for(let i=0;i<roleList.length;i++){
    if(!usedArr.includes(String(i))){
      myIndex=i;
      usedArr.push(String(i));
      break;
    }
  }

  if(myIndex===null){alert("満員");return;}

  let newUrl=location.origin+location.pathname+
  "?roles="+encodeURIComponent(roleList.join(","))+
  "&used="+usedArr.join(",");

  history.replaceState(null,"",newUrl);

  alert("あなたはP"+(myIndex+1));
}

// 役職
function showRole(){
  if(myIndex===null){alert("参加して");return;}
  document.getElementById("role").innerText=
  "あなたの役職："+roleList[myIndex];
}

// ===== ゲーム進行 =====

function startGame(){
  if(roleList.length===0){
    alert("先に参加して");
    return;
  }

  players=roleList.map((r,i)=>({
    id:i,
    role:r,
    alive:true
  }));

  render();
}

function render(){
  let html=`<h2>${phase==="day"?"昼":"夜"}</h2>`;

  players.forEach((p,i)=>{
    html+=`<div class="${!p.alive?"dead":""}">
    P${i+1} ${p.alive?"":"💀"}
    </div>`;
  });

  html+="<br>";

  if(phase==="day"){
    html+="<h3>投票</h3>";
    players.forEach((p,i)=>{
      if(p.alive){
        html+=`<button onclick="vote(${i})">P${i+1}</button>`;
      }
    });
    html+=`<br><button onclick="phase='night';render()">夜へ</button>`;
  }

  if(phase==="night"){
    html+="<h3>夜行動</h3>";

    html+="🐺<br>";
    players.forEach((p,i)=>{
      if(p.alive){
        html+=`<button onclick="attack(${i})">P${i+1}</button>`;
      }
    });

    html+="<br>🔮<br>";
    players.forEach((p,i)=>{
      if(p.alive){
        html+=`<button onclick="fortune(${i})">P${i+1}</button>`;
      }
    });

    html+="<br>🛡<br>";
    players.forEach((p,i)=>{
      if(p.alive){
        html+=`<button onclick="guardPlayer(${i})">P${i+1}</button>`;
      }
    });

    html+=`<br><button onclick="phase='day';render()">昼へ</button>`;
  }

  document.getElementById("game").innerHTML=html;
}

// ===== 行動 =====

function vote(i){
  players[i].alive=false;
  alert("処刑");
  checkWin();
  render();
}

function attack(i){
  if(i===guard){
    alert("守られた");
  }else{
    players[i].alive=false;
    alert("襲撃成功");
  }
  guard=-1;
  checkWin();
  render();
}

function fortune(i){
  alert(players[i].role==="人狼"?"人狼":"白");
}

function guardPlayer(i){
  guard=i;
  alert("守った");
}

// 勝敗
function checkWin(){
  let wolf=players.filter(p=>p.role==="人狼"&&p.alive).length;
  let human=players.filter(p=>p.role!=="人狼"&&p.alive).length;

  if(wolf===0) alert("村人勝ち");
  if(wolf>=human) alert("人狼勝ち");
}
</script>

</body>
</html>
