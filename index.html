<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんコレクション</title>
<style>
  body {
    font-family: "Arial", sans-serif;
    background-color: #fff5ee;
    text-align: center;
    padding: 20px;
  }
  h1 { color: #ff6f61; }
  .dog-area {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .dog {
    border: 2px solid #ccc;
    border-radius: 10px;
    padding: 10px;
    width: 120px;
    cursor: pointer;
    background-color: #fff8dc;
  }
  .dog img {
    width: 100px;
    height: 100px;
  }
  #log {
    margin-top: 20px;
    height: 120px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
    background-color: #fdf5e6;
    text-align: left;
  }
  #points {
    font-weight: bold;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<h1>🐶わんコレクション🐶</h1>
<div id="points">ポイント: 0</div>

<div class="dog-area" id="dogArea">
  <!-- 犬がここに表示される -->
</div>

<div id="log"></div>

<script>
const dogs = [
  { name: "ちわわ", img: "https://i.imgur.com/0KXy6.png", quiz: "小さな犬です。犬種は？", answer: "ちわわ", rare: false },
  { name: "ポメラニアン", img: "https://i.imgur.com/1g0qC.png", quiz: "ふわふわした毛の犬です。犬種は？", answer: "ポメラニアン", rare: false },
  { name: "ゴールデンレトリバー", img: "https://i.imgur.com/Kz0qG.png", quiz: "大型で人懐こい犬です。犬種は？", answer: "ゴールデンレトリバー", rare: true },
];

let points = 0;
const dogArea = document.getElementById('dogArea');
const log = document.getElementById('log');
const pointsDisplay = document.getElementById('points');

function logMessage(msg) {
  log.innerHTML += msg + "<br>";
  log.scrollTop = log.scrollHeight;
}

function spawnDogs() {
  dogArea.innerHTML = "";
  const shuffled = dogs.sort(() => 0.5 - Math.random());
  shuffled.slice(0, 3).forEach(dog => {
    const dogDiv = document.createElement('div');
    dogDiv.className = "dog";
    dogDiv.innerHTML = `<h3>${dog.name}</h3><img src="${dog.img}" alt="${dog.name}">`;
    dogDiv.onclick = () => captureDog(dog);
    dogArea.appendChild(dogDiv);
  });
}

function captureDog(dog) {
  const userAnswer = prompt(dog.quiz);
  if(userAnswer && userAnswer.trim() === dog.answer) {
    const earned = dog.rare ? 20 : 10;
    points += earned;
    pointsDisplay.textContent = `ポイント: ${points}`;
    logMessage(`✅ ${dog.name}を捕まえた！ +${earned}ポイント`);
  } else {
    logMessage(`❌ ${dog.name}の捕獲失敗…`);
  }
  spawnDogs();
}

spawnDogs();
</script>

</body>
</html>
