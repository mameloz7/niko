<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>KAKI-WARS 完成版</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
  text-align: center;
}
canvas {
  border: 1px solid white;
  margin-top: 10px;
}
#ui {
  margin-top: 10px;
}
video {
  width: 120px;
}
button {
  margin: 5px;
  padding: 8px;
}
</style>
</head>
<body>

<h1>KAKI-WARS</h1>

<div id="ui">
  <video id="video" autoplay></video><br>
  <button onclick="startCamera()">カメラON</button>
  <button onclick="takePhoto()">撮影</button>
  <button onclick="startGame()">スタート</button>
</div>

<canvas id="gameCanvas" width="480" height="320"></canvas>
<canvas id="photoCanvas" style="display:none;"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const video = document.getElementById("video");
const photoCanvas = document.getElementById("photoCanvas");
const photoCtx = photoCanvas.getContext("2d");

let faceImage = null;

// ===== カメラ =====
function startCamera() {
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => video.srcObject = stream)
    .catch(() => alert("カメラ使えない"));
}

function takePhoto() {
  photoCanvas.width = video.videoWidth;
  photoCanvas.height = video.videoHeight;
  photoCtx.drawImage(video, 0, 0);

  faceImage = new Image();
  faceImage.src = photoCanvas.toDataURL("image/png");

  alert("撮影完了！");
}

// ===== ゲーム状態 =====
let gameStarted = false;
let score = 0;

let player = {
  x: 200,
  y: 260,
  size: 40,
  speed: 5,
  bullets: []
};

let enemies = [];
let spawnTimer = 0;

// ===== 操作 =====
const keys = {};
document.addEventListener("keydown", e => {
  keys[e.code] = true;

  if (e.code === "Space" && gameStarted) {
    shoot();
  }
});
document.addEventListener("keyup", e => keys[e.code] = false);

canvas.addEventListener("click", () => {
  if (gameStarted) shoot();
});

function shoot() {
  player.bullets.push({
    x: player.x + player.size/2,
    y: player.y,
    size: 4,
    speed: 7
  });
}

// ===== スタート =====
function startGame() {
  score = 0;
  enemies = [];
  player.bullets = [];
  gameStarted = true;
}

// ===== 描画 =====
function drawPlayer() {
  ctx.fillStyle = "cyan";
  ctx.fillRect(player.x, player.y, player.size, player.size);
}

// ===== 更新 =====
function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if (!gameStarted) {
    ctx.fillStyle = "white";
    ctx.fillText("スタートを押してね", 170, 150);
    requestAnimationFrame(update);
    return;
  }

  // 移動
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  drawPlayer();

  // 弾
  player.bullets.forEach(b => b.y -= b.speed);
  player.bullets = player.bullets.filter(b => b.y > 0);

  ctx.fillStyle = "lime";
  player.bullets.forEach(b => ctx.fillRect(b.x,b.y,b.size,b.size));

  // 敵生成
  spawnTimer++;
  if (spawnTimer > 40) {
    enemies.push({
      x: Math.random()*440,
      y: 0,
      size: 40,
      speed: 2,
      image: faceImage
    });
    spawnTimer = 0;
  }

  // 敵処理
  enemies.forEach(e => {
    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 0) {
      e.x += (dx/dist) * e.speed;
      e.y += (dy/dist) * e.speed;
    }

    if (e.image) {
      ctx.drawImage(e.image, e.x, e.y, e.size, e.size);
    } else {
      ctx.fillStyle = "red";
      ctx.fillRect(e.x, e.y, e.size, e.size);
    }
  });

  // 弾当たり判定
  player.bullets.forEach(b => {
    enemies.forEach(e => {
      if (
        b.x < e.x + e.size &&
        b.x > e.x &&
        b.y < e.y + e.size &&
        b.y > e.y
      ) {
        b.hit = true;
        e.hit = true;
        score += 10;
      }
    });
  });

  player.bullets = player.bullets.filter(b => !b.hit);
  enemies = enemies.filter(e => !e.hit);

  // プレイヤー衝突
  enemies.forEach(e => {
    if (
      player.x < e.x + e.size &&
      player.x + player.size > e.x &&
      player.y < e.y + e.size &&
      player.y + player.size > e.y
    ) {
      gameOver();
    }
  });

  // スコア
  ctx.fillStyle = "white";
  ctx.fillText("Score: " + score, 10, 20);

  requestAnimationFrame(update);
}

// ===== ランキング =====
function saveScore() {
  let scores = JSON.parse(localStorage.getItem("rank")) || [];
  scores.push(score);
  scores.sort((a,b)=>b-a);
  scores = scores.slice(0,5);
  localStorage.setItem("rank", JSON.stringify(scores));
}

function showRanking() {
  let scores = JSON.parse(localStorage.getItem("rank")) || [];
  alert("ランキング\n" + scores.join("\n"));
}

// ===== ゲームオーバー =====
function gameOver() {
  saveScore();
  showRanking();
  alert("ゲームオーバー！スコア: " + score);
  location.reload();
}

update();
</script>
</body>
</html>
