<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Face Hunter</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: sans-serif;
}
#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}
.face {
  position: absolute;
  font-size: 40px;
  cursor: pointer;
  user-select: none;
}
#ui {
  position: absolute;
  top: 10px;
  left: 10px;
}
#ranking {
  position: absolute;
  right: 10px;
  top: 10px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
}
button {
  padding: 10px;
}
</style>
</head>
<body>

<div id="game">
  <div id="ui">
    <div>スコア: <span id="score">0</span></div>
    <div>残り時間: <span id="time">30</span></div>
    <button onclick="startGame()">スタート</button>
  </div>
  <div id="ranking">
    <b>ランキング</b>
    <ol id="rankList"></ol>
  </div>
</div>

<script>
let score = 0;
let time = 30;
let gameInterval;
let spawnInterval;

function randomFace() {
  const faces = ["😀","😈","😎","🤪","👻"];
  return faces[Math.floor(Math.random()*faces.length)];
}

function spawnFace() {
  const face = document.createElement("div");
  face.className = "face";
  face.innerText = randomFace();

  face.style.left = Math.random() * (window.innerWidth - 50) + "px";
  face.style.top = Math.random() * (window.innerHeight - 50) + "px";

  face.onclick = () => {
    score += 10;
    document.getElementById("score").innerText = score;
    face.remove();
  };

  document.getElementById("game").appendChild(face);

  setTimeout(() => face.remove(), 2000);
}

function startGame() {
  score = 0;
  time = 30;
  document.getElementById("score").innerText = score;
  document.getElementById("time").innerText = time;

  clearInterval(gameInterval);
  clearInterval(spawnInterval);

  spawnInterval = setInterval(spawnFace, 500);

  gameInterval = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  clearInterval(gameInterval);
  clearInterval(spawnInterval);
  saveScore(score);
  loadRanking();
  alert("ゲーム終了！スコア: " + score);
}

function saveScore(newScore) {
  let scores = JSON.parse(localStorage.getItem("ranking")) || [];
  scores.push(newScore);
  scores.sort((a,b)=>b-a);
  scores = scores.slice(0,5);
  localStorage.setItem("ranking", JSON.stringify(scores));
}

function loadRanking() {
  let scores = JSON.parse(localStorage.getItem("ranking")) || [];
  const list = document.getElementById("rankList");
  list.innerHTML = "";
  scores.forEach(s => {
    const li = document.createElement("li");
    li.innerText = s;
    list.appendChild(li);
  });
}

loadRanking();
</script>

</body>
</html>
