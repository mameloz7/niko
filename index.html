<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんバトル</title>
<style>
  body {
    font-family: "Arial", sans-serif;
    background-color: #f0f8ff;
    text-align: center;
    padding: 20px;
  }
  h1 { color: #ff6f61; }
  .dog-container {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin-bottom: 20px;
  }
  .dog {
    border: 2px solid #ccc;
    padding: 10px;
    border-radius: 10px;
    width: 150px;
  }
  .dog img {
    width: 100px;
    height: 100px;
  }
  .hp-bar {
    height: 20px;
    background-color: #4caf50;
    margin-top: 5px;
  }
  button {
    margin: 5px;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 5px;
  }
  #log {
    margin-top: 20px;
    height: 100px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
    background-color: #fff;
    text-align: left;
  }
</style>
</head>
<body>

<h1>🐶わんバトル🐶</h1>

<div class="dog-container">
  <div class="dog" id="playerDog">
    <h2>ちわわ</h2>
    <img src="https://i.imgur.com/0KXy6.png" alt="ちわわ">
    <div>HP: <span id="playerHp">100</span></div>
    <div class="hp-bar" id="playerHpBar"></div>
  </div>

  <div class="dog" id="enemyDog">
    <h2>ポメラニアン</h2>
    <img src="https://i.imgur.com/1g0qC.png" alt="ポメラニアン">
    <div>HP: <span id="enemyHp">100</span></div>
    <div class="hp-bar" id="enemyHpBar"></div>
  </div>
</div>

<div>
  <button onclick="attack('かむ')">かむ</button>
  <button onclick="attack('ぱんち')">ぱんち</button>
  <button onclick="attack('吠える')">吠える</button>
  <button onclick="attack('甘える')">甘える</button>
</div>

<div id="log"></div>

<script>
let playerHp = 100;
let enemyHp = 100;

function updateHp() {
  document.getElementById('playerHp').textContent = playerHp;
  document.getElementById('enemyHp').textContent = enemyHp;
  document.getElementById('playerHpBar').style.width = playerHp + '%';
  document.getElementById('enemyHpBar').style.width = enemyHp + '%';
}

function logMessage(msg) {
  const log = document.getElementById('log');
  log.innerHTML += msg + "<br>";
  log.scrollTop = log.scrollHeight;
}

function attack(action) {
  let damage = 0;
  let message = '';
  
  switch(action) {
    case 'かむ':
      damage = Math.floor(Math.random() * 15) + 10;
      message = `プレイヤーの犬が「かむ」を使った！ ${damage}ダメージ！`;
      break;
    case 'ぱんち':
      damage = Math.floor(Math.random() * 25) + 15;
      message = `プレイヤーの犬が「ぱんち」を使った！ ${damage}ダメージ！`;
      break;
    case '吠える':
      damage = 0;
      message = '敵のスピードが下がった！（効果は簡略化）';
      break;
    case '甘える':
      if(Math.random() < 0.5) {
        damage = 0;
        message = '敵が行動できない！（甘える成功！）';
        enemyHp -= 0; // ダメージなし
        logMessage(message);
        return;
      } else {
        damage = 0;
        message = '甘える失敗…';
        break;
      }
  }

  enemyHp -= damage;
  if(enemyHp < 0) enemyHp = 0;
  logMessage(message);
  updateHp();

  if(enemyHp <= 0) {
    logMessage('🎉勝利！敵の犬を倒した！');
    return;
  }

  // 敵の攻撃
  setTimeout(enemyAttack, 500);
}

function enemyAttack() {
  const actions = ['かむ', 'ぱんち'];
  const choice = actions[Math.floor(Math.random() * actions.length)];
  let damage = choice === 'かむ' ? Math.floor(Math.random() * 10) + 5 : Math.floor(Math.random() * 20) + 10;
  playerHp -= damage;
  if(playerHp < 0) playerHp = 0;
  logMessage(`敵の犬が「${choice}」を使った！ ${damage}ダメージ！`);
  updateHp();

  if(playerHp <= 0) {
    logMessage('💀敗北…あなたの犬は倒された。');
  }
}

updateHp();
</script>

</body>
</html>
