<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人狼風合体ゲーム</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.14.2/matter.min.js"></script>
<script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

<style>
body{
  margin:0;
  background:#222;
  color:white;
  text-align:center;
}
#score{
  font-size:30px;
}
</style>
</head>

<body>
<div>score:<span id="score">0</span></div>

<script>
// ===== Matter.js =====
const { Engine, Render, World, Bodies, Body, Events } = Matter;

let total_score = 0;

// オブジェクト
const objectDefinitions = [
 { texture: "https://via.placeholder.com/50", size: 25, label: "a", originalWidth:50, originalHeight:50, score:10 },
 { texture: "https://via.placeholder.com/60", size: 35, label: "b", originalWidth:60, originalHeight:60, score:20 },
 { texture: "https://via.placeholder.com/70", size: 45, label: "c", originalWidth:70, originalHeight:70, score:30 }
];

// ランダム生成
function createRandomFallingObject(x, y){
  const def = objectDefinitions[Math.floor(Math.random()*objectDefinitions.length)];
  return Bodies.circle(x, y, def.size, {
    label: def.label,
    isStatic: true,
    render:{ sprite:{ texture:def.texture } }
  });
}

// 次の進化
function getNext(label){
  for(let i=0;i<objectDefinitions.length;i++){
    if(objectDefinitions[i].label===label){
      return objectDefinitions[i+1] || null;
    }
  }
}

// エンジン
const engine = Engine.create();
const render = Render.create({
  element: document.body,
  engine: engine,
  options:{
    width:400,
    height:600,
    wireframes:false
  }
});

const width = 400;
const height = 600;

// 壁
World.add(engine.world, [
  Bodies.rectangle(width/2,height, width,20,{isStatic:true}),
  Bodies.rectangle(0,height/2,20,height,{isStatic:true}),
  Bodies.rectangle(width,height/2,20,height,{isStatic:true})
]);

// 合体
Events.on(engine,'collisionStart',e=>{
  e.pairs.forEach(pair=>{
    if(pair.bodyA.label===pair.bodyB.label){
      const next = getNext(pair.bodyA.label);
      if(next){
        total_score += next.score;
        $('#score').text(total_score);

        const x = (pair.bodyA.position.x + pair.bodyB.position.x)/2;
        const y = (pair.bodyA.position.y + pair.bodyB.position.y)/2;

        World.remove(engine.world,[pair.bodyA,pair.bodyB]);
        World.add(engine.world,
          Bodies.circle(x,y,next.size,{label:next.label})
        );
      }
    }
  });
});

// 操作
let nextObject = createRandomFallingObject(width/2,50);
let falling = false;
World.add(engine.world,nextObject);

window.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    falling = true;
    Body.setStatic(nextObject,false);

    setTimeout(()=>{
      nextObject = createRandomFallingObject(width/2,50);
      falling = false;
      World.add(engine.world,nextObject);
    },1000);
  }

  if(e.code==='ArrowLeft' && !falling){
    Body.translate(nextObject,{x:-20,y:0});
  }

  if(e.code==='ArrowRight' && !falling){
    Body.translate(nextObject,{x:20,y:0});
  }
});

Render.run(render);
Engine.run(engine);
</script>

</body>
</html>
